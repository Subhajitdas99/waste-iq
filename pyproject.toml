[tool.black]
line-length = 100

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W"]

[tool.ruff.lint.per-file-ignores]
"**/alembic/versions/*.py" = ["E501", "E402"]
"**/tests/conftest.py" = ["E402"]

[tool.mypy]
python_version = "3.12"
mypy_path = ["backend"]
warn_unused_configs = true
check_untyped_defs = true
disallow_incomplete_defs = false
ignore_missing_imports = false

[[tool.mypy.overrides]]
module = [
    "cloudinary",
    "cloudinary.*",
    "jose",
    "passlib",
    "passlib.*",
]
ignore_missing_imports = true